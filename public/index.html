<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Somatic Recovery – Asistent Virtual</title>
<style>
  :root {
    --green-deep:   #2D5016;
    --green-mid:    #4A7C2F;
    --green-soft:   #6BA050;
    --green-pale:   #C8DDB8;
    --green-mist:   #EAF2E3;
    --green-foam:   #F4F9F0;
    --white:        #FFFFFF;
    --text-dark:    #1A2E0D;
    --text-mid:     #3D5C28;
    --text-light:   #6B8C52;
    --shadow:       rgba(45, 80, 22, 0.12);
    --radius:       14px;
    --radius-sm:    8px;
    --font-body:    'Segoe UI', system-ui, -apple-system, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-body);
    background: var(--green-foam);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* ── TOP BAR ── */
  .topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    background: var(--white);
    border-bottom: 1px solid var(--green-pale);
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 20px;
    z-index: 100;
    box-shadow: 0 2px 8px var(--shadow);
  }
  .topbar-logo {
    width: 42px; height: 42px;
    border-radius: 50%;
    object-fit: contain;
    border: 2px solid var(--green-pale);
  }
  .topbar-info { flex: 1; }
  .topbar-name {
    font-weight: 700;
    font-size: 15px;
    color: var(--green-deep);
    line-height: 1.2;
  }
  .topbar-sub {
    font-size: 12px;
    color: var(--text-light);
  }
  .topbar-links {
    display: flex; gap: 8px;
    flex-wrap: wrap;
  }
  .topbar-link {
    font-size: 12px;
    color: var(--green-mid);
    text-decoration: none;
    padding: 4px 10px;
    border: 1px solid var(--green-pale);
    border-radius: 20px;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .topbar-link:hover { background: var(--green-mist); }

  /* ── CHAT WRAP ── */
  .chat-wrap {
    width: 100%;
    max-width: 740px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    padding-top: 64px;
  }

  /* ── MESSAGES ── */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px 12px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--green-pale); border-radius: 4px; }

  .msg {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    max-width: 86%;
    animation: fadeUp 0.25s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .msg.bot { align-self: flex-start; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }

  .msg-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--green-mist);
    border: 2px solid var(--green-pale);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    overflow: hidden;
  }
  .msg-avatar img { width: 100%; height: 100%; object-fit: cover; }

  .msg-bubble {
    padding: 11px 15px;
    border-radius: var(--radius);
    font-size: 14.5px;
    line-height: 1.55;
    max-width: 100%;
  }
  .msg.bot .msg-bubble {
    background: var(--white);
    color: var(--text-dark);
    border-bottom-left-radius: 4px;
    box-shadow: 0 1px 4px var(--shadow);
  }
  .msg.user .msg-bubble {
    background: var(--green-mid);
    color: var(--white);
    border-bottom-right-radius: 4px;
  }
  .msg-bubble a { color: var(--green-soft); }
  .msg.user .msg-bubble a { color: var(--green-pale); }

  /* typing dots */
  .typing-dots { display: flex; gap: 5px; padding: 4px 0; }
  .typing-dots span {
    width: 7px; height: 7px;
    background: var(--green-soft);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); }
    30%          { transform: translateY(-6px); }
  }

  /* ── QUICK CHIPS ── */
  .chips-wrap {
    padding: 0 16px 8px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .chip {
    font-size: 13px;
    padding: 7px 14px;
    border: 1.5px solid var(--green-soft);
    border-radius: 20px;
    background: var(--white);
    color: var(--green-mid);
    cursor: pointer;
    transition: background 0.18s, color 0.18s;
    white-space: nowrap;
    font-family: var(--font-body);
  }
  .chip:hover { background: var(--green-mid); color: var(--white); }

  /* ── INPUT ROW ── */
  .input-row {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    padding: 10px 16px 14px;
    background: var(--white);
    border-top: 1px solid var(--green-pale);
  }
  .input-field {
    flex: 1;
    resize: none;
    border: 1.5px solid var(--green-pale);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-family: var(--font-body);
    font-size: 14.5px;
    color: var(--text-dark);
    background: var(--green-foam);
    outline: none;
    max-height: 120px;
    line-height: 1.5;
    transition: border-color 0.2s;
  }
  .input-field:focus { border-color: var(--green-soft); background: var(--white); }
  .input-field::placeholder { color: var(--text-light); }

  .send-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--green-mid);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, transform 0.15s;
    flex-shrink: 0;
  }
  .send-btn:hover { background: var(--green-deep); transform: scale(1.05); }
  .send-btn:disabled { background: var(--green-pale); cursor: default; transform: none; }
  .send-btn svg { width: 20px; height: 20px; fill: white; }

  /* ── PROGRAMARE FORM ── */
  .form-card {
    background: var(--green-mist);
    border: 1.5px solid var(--green-pale);
    border-radius: var(--radius);
    padding: 16px;
    margin-top: 4px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .form-card label { font-size: 13px; color: var(--text-mid); font-weight: 600; }
  .form-card input, .form-card select, .form-card textarea {
    width: 100%;
    padding: 9px 12px;
    border: 1.5px solid var(--green-pale);
    border-radius: var(--radius-sm);
    font-family: var(--font-body);
    font-size: 14px;
    color: var(--text-dark);
    background: var(--white);
    outline: none;
    transition: border-color 0.2s;
  }
  .form-card input:focus,
  .form-card select:focus,
  .form-card textarea:focus { border-color: var(--green-soft); }
  .form-card textarea { resize: vertical; min-height: 70px; }
  .form-card .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-submit {
    background: var(--green-mid);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    padding: 11px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    font-family: var(--font-body);
  }
  .form-submit:hover { background: var(--green-deep); }
  .form-submit:disabled { background: var(--green-pale); cursor: default; }

  /* ── DISCLAIMER ── */
  .disclaimer {
    text-align: center;
    font-size: 11.5px;
    color: var(--text-light);
    padding: 4px 16px 8px;
  }

  @media (max-width: 500px) {
    .topbar-links { display: none; }
    .form-card .row2 { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <img class="topbar-logo"
       src="https://somaticrecovery.ro/wp-content/uploads/2024/01/cropped-Logo-Somatic-Recovery.png"
       onerror="this.style.display='none'"
       alt="Somatic Recovery logo">
  <div class="topbar-info">
    <div class="topbar-name">Somatic Recovery</div>
    <div class="topbar-sub">Asistent virtual · Online non-stop</div>
  </div>
  <div class="topbar-links">
    <a class="topbar-link" href="https://somaticrecovery.ro" target="_blank">Site oficial</a>
    <a class="topbar-link" href="mailto:kineto@somaticrecovery.ro">Email</a>
    <a class="topbar-link" href="tel:+40772214815">0772 214 815</a>
  </div>
</div>

<!-- CHAT WRAP -->
<div class="chat-wrap">
  <div class="messages" id="messages"></div>

  <!-- Quick chips -->
  <div class="chips-wrap" id="chips">
    <button class="chip" onclick="sendChip(this)">Servicii disponibile</button>
    <button class="chip" onclick="sendChip(this)">Prețuri</button>
    <button class="chip" onclick="sendChip(this)">Cum funcționează ședința</button>
    <button class="chip" onclick="sendChip(this)">Vreau o programare</button>
    <button class="chip" onclick="sendChip(this)">Zona de acoperire</button>
  </div>

  <div class="input-row">
    <textarea class="input-field" id="inputField"
              placeholder="Scrieți un mesaj…" rows="1"
              onkeydown="handleKey(event)"
              oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="disclaimer">Asistentul AI poate greși. Informațiile medicale nu înlocuiesc consultul de specialitate.</div>
</div>

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
// ════════════════════════════════════════════════
//  CONFIG — completați cu datele reale
// ════════════════════════════════════════════════
const EMAILJS_PUBLIC_KEY  = "da6WwgBH-1zzB67FM";   // din EmailJS → Account
const EMAILJS_SERVICE_ID  = "service_ox9uxrd";     // din EmailJS → Email Services
const EMAILJS_TEMPLATE_ID = "template_ryio7hp";    // din EmailJS → Email Templates


// ════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════
let conversationHistory = [];
let isLoading = false;
let bookingFormShown = false;

// ════════════════════════════════════════════════
//  DB HELPERS (localStorage ca fallback simplu)
// ════════════════════════════════════════════════
function saveBooking(data) {
  const key = "sr_booking_" + Date.now();
  const record = { ...data, timestamp: new Date().toISOString(), status: "pending" };
  try { localStorage.setItem(key, JSON.stringify(record)); } catch(e) {}
  return record;
}

// ════════════════════════════════════════════════
//  EMAIL
// ════════════════════════════════════════════════
function initEmailJS() {
  if (EMAILJS_PUBLIC_KEY !== "YOUR_EMAILJS_PUBLIC_KEY") {
    emailjs.init({ publicKey: EMAILJS_PUBLIC_KEY });
  }
}

async function sendEmail(booking) {
  if (EMAILJS_PUBLIC_KEY === "YOUR_EMAILJS_PUBLIC_KEY") {
    console.log("EmailJS neconfigurat — programare salvată local:", booking);
    return true;
  }
  try {
    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
      to_email:    "kineto@somaticrecovery.ro",
      patient_name: booking.name,
      phone:        booking.phone,
      condition:    booking.condition,
      call_hours:   booking.callHours,
      timestamp:    booking.timestamp,
    });
    return true;
  } catch(e) {
    console.error("EmailJS error:", e);
    return false;
  }
}

// ════════════════════════════════════════════════
//  RENDER HELPERS
// ════════════════════════════════════════════════
function appendMessage(role, content, extraHTML = "") {
  const msgs = document.getElementById("messages");
  const div = document.createElement("div");
  div.className = "msg " + (role === "user" ? "user" : "bot");

  const avatar = document.createElement("div");
  avatar.className = "msg-avatar";
  if (role === "bot") {
    const img = document.createElement("img");
    img.src = "https://somaticrecovery.ro/wp-content/uploads/2024/01/cropped-Logo-Somatic-Recovery.png";
    img.onerror = () => { avatar.textContent = "🌿"; };
    avatar.appendChild(img);
  } else {
    avatar.textContent = "👤";
  }

  const bubble = document.createElement("div");
  bubble.className = "msg-bubble";
  bubble.innerHTML = formatText(content);
  if (extraHTML) {
    const extra = document.createElement("div");
    extra.innerHTML = extraHTML;
    bubble.appendChild(extra);
  }

  div.appendChild(avatar);
  div.appendChild(bubble);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function formatText(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
    .replace(/\*(.*?)\*/g, "<em>$1</em>")
    .replace(/\n/g, "<br>");
}

function showTyping() {
  const msgs = document.getElementById("messages");
  const div = document.createElement("div");
  div.className = "msg bot"; div.id = "typing-indicator";
  div.innerHTML = `
    <div class="msg-avatar"><img src="https://somaticrecovery.ro/wp-content/uploads/2024/01/cropped-Logo-Somatic-Recovery.png" onerror="this.parentElement.textContent='🌿'"></div>
    <div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById("typing-indicator");
  if (el) el.remove();
}

// ════════════════════════════════════════════════
//  BOOKING FORM
// ════════════════════════════════════════════════
function buildBookingForm() {
  return `
    <div class="form-card" id="bookingForm">
      <div>
        <label>Nume și prenume *</label>
        <input type="text" id="bf-name" placeholder="ex. Ion Popescu" autocomplete="name">
      </div>
      <div>
        <label>Număr de telefon *</label>
        <input type="tel" id="bf-phone" placeholder="07xx xxx xxx" autocomplete="tel">
      </div>
      <div>
        <label>Afecțiunea / motivul consultației *</label>
        <textarea id="bf-condition" placeholder="ex. dureri lombare, recuperare post-operatorie genunchi..."></textarea>
      </div>
      <div>
        <label>Interval orar preferat pentru a fi sunat *</label>
        <select id="bf-hours">
          <option value="">— Selectați intervalul —</option>
          <option>08:00 – 10:00</option>
          <option>10:00 – 12:00</option>
          <option>12:00 – 14:00</option>
          <option>14:00 – 16:00</option>
          <option>16:00 – 18:00</option>
          <option>18:00 – 20:00</option>
        </select>
      </div>
      <button class="form-submit" id="bf-submit" onclick="submitBooking()">Trimite solicitarea de programare</button>
    </div>`;
}

async function submitBooking() {
  const name      = document.getElementById("bf-name").value.trim();
  const phone     = document.getElementById("bf-phone").value.trim();
  const condition = document.getElementById("bf-condition").value.trim();
  const callHours = document.getElementById("bf-hours").value;

  if (!name || !phone || !condition || !callHours) {
    alert("Vă rugăm completați toate câmpurile obligatorii.");
    return;
  }

  const btn = document.getElementById("bf-submit");
  btn.disabled = true;
  btn.textContent = "Se trimite…";

  const booking = { name, phone, condition, callHours };
  const record  = saveBooking(booking);
  const ok      = await sendEmail(record);

  // Remove form
  document.getElementById("bookingForm").closest(".msg").remove();

  if (ok) {
    appendMessage("bot",
      `✅ **Solicitarea a fost înregistrată cu succes!**\n\nMulțumim, **${name}**! Silviu Costin vă va contacta la numărul **${phone}** în intervalul orar preferat (${callHours}).\n\nDacă aveți urgențe, ne puteți suna direct la **0772 214 815** sau scrie pe email la **kineto@somaticrecovery.ro**.`
    );
  } else {
    appendMessage("bot",
      `⚠️ Solicitarea a fost salvată, dar a apărut o problemă la trimiterea emailului. Vă rugăm să ne contactați direct:\n📞 **0772 214 815**\n✉️ **kineto@somaticrecovery.ro**`
    );
  }
  bookingFormShown = false;
}

// ════════════════════════════════════════════════
//  DETECT BOOKING INTENT
// ════════════════════════════════════════════════
function wantsBooking(text) {
  const t = text.toLowerCase();
  return /(programar|program|rezervar|appoint|vreau\s+s[aă]\s+m[aă]\s+program|fix|consultati|vin\s+acas)/i.test(t);
}

// ════════════════════════════════════════════════
//  MAIN SEND
// ════════════════════════════════════════════════
async function sendMessage(textOverride) {
  if (isLoading) return;
  const field = document.getElementById("inputField");
  const text  = (textOverride || field.value).trim();
  if (!text) return;

  field.value = "";
  autoResize(field);
  document.getElementById("chips").style.display = "none";

  appendMessage("user", text);
  conversationHistory.push({ role: "user", content: text });

  // If booking intent and form not shown yet
  if (wantsBooking(text) && !bookingFormShown) {
    bookingFormShown = true;
    isLoading = true;
    showTyping();
    await sleep(700);
    removeTyping();
    appendMessage("bot",
      "Cu plăcere! Am pregătit formularul de mai jos — completați datele și vă vom contacta în cel mai scurt timp. 📋",
      buildBookingForm()
    );
    conversationHistory.push({ role: "assistant", content: "Am afișat formularul de programare." });
    isLoading = false;
    setBtnState(false);
    return;
  }

  isLoading = true;
  setBtnState(true);
  showTyping();

  try {
    const resp = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        messages: conversationHistory.slice(-20),
      })
    });

    removeTyping();

    if (!resp.ok) throw new Error("API error " + resp.status);
    const data = await resp.json();
    const reply = data.reply || "Ne pare rău, nu am putut genera un răspuns.";

    conversationHistory.push({ role: "assistant", content: reply });

    // Check if AI recommends booking
    if (!bookingFormShown && /formularul|programare|completați/i.test(reply)) {
      bookingFormShown = true;
      appendMessage("bot", reply, buildBookingForm());
    } else {
      appendMessage("bot", reply);
    }

  } catch(e) {
    removeTyping();
    appendMessage("bot", "⚠️ A apărut o eroare de conexiune. Vă rugăm să încercați din nou sau să ne contactați direct la **0772 214 815**.");
  }

  isLoading = false;
  setBtnState(false);
}

function sendChip(btn) {
  sendMessage(btn.textContent);
}

// ════════════════════════════════════════════════
//  UI UTILS
// ════════════════════════════════════════════════
function setBtnState(loading) {
  const btn = document.getElementById("sendBtn");
  btn.disabled = loading;
}

function autoResize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 120) + "px";
}

function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════
window.addEventListener("load", () => {
  initEmailJS();
  appendMessage("bot",
    "Bună ziua! 👋 Sunt asistentul virtual al **Somatic Recovery**.\n\nVă pot ajuta cu informații despre serviciile de fiziokinetoterapie la domiciliu, prețuri, sfaturi sau o **programare** cu Silviu Costin.\n\nCu ce vă pot fi de folos astăzi?"
  );
});
</script>
</body>
</html>
